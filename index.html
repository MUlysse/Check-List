<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ma Checklist</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #f5f5f0);
    --bg2: var(--tg-theme-secondary-bg-color, #ebebeb);
    --text: var(--tg-theme-text-color, #1a1a1a);
    --hint: var(--tg-theme-hint-color, #888);
    --accent: #c0392b;
    --todo-bg: #fef9e7;
    --todo-color: #b7770d;
    --done-bg: #eafaf1;
    --done-color: #1e8449;
    --header-bg: #1f3a5f;
    --border: #ddd;
    --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; padding-bottom: 20px; }

  .app-header { background: var(--header-bg); color: white; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
  .app-title { font-size: 17px; font-weight: 600; letter-spacing: -0.2px; }
  .app-counter { font-size: 13px; background: rgba(255,255,255,0.15); padding: 4px 11px; border-radius: 20px; font-weight: 500; }

  .filter-bar { display: flex; gap: 6px; padding: 10px 12px; background: var(--bg2); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .flt { font-size: 12px; font-weight: 500; padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border); background: white; color: var(--hint); cursor: pointer; white-space: nowrap; transition: all 0.15s; font-family: 'IBM Plex Sans', sans-serif; }
  .flt.active { background: var(--header-bg); border-color: var(--header-bg); color: white; }

  .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; min-width: 400px; background: white; }
  thead tr { background: var(--header-bg); color: white; }
  th { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; padding: 10px 14px; text-align: left; white-space: nowrap; }
  th:first-child { width: 36px; padding-left: 12px; }
  th:nth-child(2) { width: 130px; }
  th:last-child { width: 90px; text-align: center; }

  tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.1s; }
  tbody tr:hover { background: #f9f9f6; }
  tbody tr.prio { background: #fff8f8; }
  tbody tr.prio:hover { background: #fff0ef; }
  tbody tr.done { opacity: 0.5; }
  tbody tr.done td:nth-child(3) { text-decoration: line-through; }
  td { padding: 11px 14px; vertical-align: middle; font-size: 13.5px; line-height: 1.35; }
  td:first-child { padding-left: 12px; width: 36px; }
  td:last-child { text-align: center; }

  .cat-cell { font-weight: 600; font-size: 13px; white-space: nowrap; }
  tr.prio .cat-cell { color: var(--accent); }
  tr.prio td:nth-child(3) { color: var(--accent); font-weight: 500; }

  .cb { width: 17px; height: 17px; border-radius: 4px; border: 1.5px solid #ccc; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  tr.done .cb { background: var(--done-color); border-color: var(--done-color); }
  .cb svg { display: none; }
  tr.done .cb svg { display: block; }

  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .badge-todo { background: var(--todo-bg); color: var(--todo-color); }
  .badge-done { background: var(--done-bg); color: var(--done-color); }

  .del-btn { background: none; border: none; color: #ccc; font-size: 16px; cursor: pointer; padding: 0 4px; line-height: 1; transition: color 0.15s; display: none; }
  tr:hover .del-btn { display: inline; }
  .del-btn:hover { color: var(--accent); }

  .add-form { padding: 10px 12px; background: white; border-top: 2px solid var(--header-bg); display: flex; gap: 6px; flex-wrap: wrap; position: sticky; bottom: 0; }
  .add-form input { font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius); outline: none; background: #fafafa; color: var(--text); transition: border-color 0.15s; }
  .add-form input:focus { border-color: var(--header-bg); background: white; }
  .add-form input::placeholder { color: #bbb; }
  #inp-cat { width: 120px; }
  #inp-task { flex: 1; min-width: 140px; }

  .btn-urgent { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; font-weight: 600; padding: 9px 12px; border-radius: var(--radius); border: 1.5px solid var(--accent); background: white; color: var(--accent); cursor: pointer; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
  .btn-urgent.on { background: var(--accent); color: white; }
  .btn-add { font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; font-weight: 600; padding: 9px 16px; border-radius: var(--radius); border: none; background: var(--header-bg); color: white; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: opacity 0.15s; }
  .btn-add:active { opacity: 0.8; }

  .done-section { padding: 10px 14px 4px; font-size: 12px; color: var(--hint); font-style: italic; background: white; border-top: 1px solid #eee; }

  .app-footer { background: var(--header-bg); color: rgba(255,255,255,0.6); font-size: 12px; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
  .btn-reset { font-family: 'IBM Plex Sans', sans-serif; font-size: 11px; padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.3); background: transparent; color: rgba(255,255,255,0.7); cursor: pointer; }

  #loading { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: var(--hint); font-size: 14px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #ddd; border-top-color: var(--header-bg); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-row td { text-align: center; padding: 32px; color: var(--hint); font-style: italic; }

  #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(12px); background: #1f3a5f; color: white; font-size: 13px; padding: 9px 18px; border-radius: 20px; z-index: 999; opacity: 0; transition: all 0.25s; white-space: nowrap; pointer-events: none; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><span>Chargement...</span></div>

<div id="app" style="display:none">
  <div class="app-header">
    <div class="app-title">Ma checklist</div>
    <div class="app-counter"><span id="cnt-done">0</span> / <span id="cnt-total">0</span> faites</div>
  </div>
  <div class="filter-bar">
    <button class="flt active" onclick="setF('all',this)">Tout</button>
    <button class="flt" onclick="setF('todo',this)">À faire</button>
    <button class="flt" onclick="setF('urgent',this)">🔴 Urgent</button>
    <button class="flt" onclick="setF('done',this)">✓ Faites</button>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr><th></th><th>Catégorie</th><th>Tâche</th><th>Statut</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="done-section" id="done-section">Aucune tâche terminée pour l'instant</div>
  <div class="add-form">
    <input id="inp-cat" type="text" placeholder="Catégorie..." list="cat-dl">
    <datalist id="cat-dl"></datalist>
    <input id="inp-task" type="text" placeholder="Nouvelle tâche...">
    <button class="btn-urgent" id="btn-urg" onclick="toggleUrgent()">Urgent ?</button>
    <button class="btn-add" onclick="addTask()">+ Ajouter</button>
  </div>
  <div class="app-footer">
    <span>Cochez pour terminer · 🗑 pour supprimer</span>
    <button class="btn-reset" onclick="resetDone()">Réinitialiser</button>
  </div>
</div>

<div id="toast"></div>

<script>
const TG = window.Telegram?.WebApp;

// ── TÂCHES PAR DÉFAUT (chargées une seule fois au 1er lancement) ──
const DEFAULT_TASKS = [
  { id:1,  category:'Colis',            task:'Chercher mon colis Fabron',                                                     priority:true,  done:false },
  { id:2,  category:'EDHEC',            task:'Checker toutes les futures échéances, travail à faire, exams, etc.',            priority:true,  done:false },
  { id:3,  category:'EDHEC',            task:'Mettre à jour mon Excel des notes',                                             priority:true,  done:false },
  { id:4,  category:'Finance perso',    task:'Faire mes comptes (Alix me devant)',                                            priority:true,  done:false },
  { id:5,  category:'IHEDN',            task:'Article IHEDN',                                                                 priority:false, done:false },
  { id:6,  category:'Junior Entreprise',task:'Relancer la prospection pour la JE',                                            priority:false, done:false },
  { id:7,  category:'Logistique',       task:'Vérifier mon EDT ICS',                                                          priority:true,  done:false },
  { id:8,  category:'Logistique',       task:'Voir avec Maman pour le déménagement',                                          priority:true,  done:false },
  { id:9,  category:'Logistique',       task:'Créer une appli check list disponible en ligne gratuitement',                   priority:true,  done:false },
  { id:10, category:'Manhattan',        task:'Chercher des profils "target to follow" (Chertok, Pigasse, etc.)',               priority:false, done:false },
  { id:11, category:'Manhattan',        task:'Inclure projets secondaires : livre, PhD, MSc, média, parti politique, etc.',   priority:false, done:false },
  { id:12, category:'Networking',       task:'Répondre à Louis-Marie',                                                        priority:true,  done:false },
  { id:13, category:'Onoris',           task:'Attendre le nouveau site pour démarcher Clémence Duclos',                       priority:false, done:false },
  { id:14, category:'Onoris',           task:'Brainstorming chaînes YouTube : devenir les Echos ou créer la galaxie Onoris',  priority:false, done:false },
  { id:15, category:'Onoris',           task:'Changer la bannière LinkedIn',                                                  priority:false, done:false },
  { id:16, category:'Onoris',           task:'Corriger template Podcast',                                                     priority:false, done:false },
  { id:17, category:'Onoris',           task:'Demander à Paul de changer les logos sur Insta',                                priority:false, done:false },
  { id:18, category:'Onoris',           task:'Envoyer messages aux Avocats pour la SCI',                                      priority:false, done:false },
  { id:19, category:'Onoris',           task:'Organiser les templates Canva + consignes',                                     priority:false, done:false },
  { id:20, category:'Onoris',           task:'Programmer un call avec Breaking into Sovereign',                               priority:false, done:false },
  { id:21, category:'Onoris',           task:'Réflexion rubrique Finance',                                                    priority:false, done:false },
  { id:22, category:'Santé',            task:'Rendez-vous dentiste',                                                          priority:true,  done:false },
  { id:23, category:'Santé',            task:'Rendez-vous dermatologue',                                                      priority:true,  done:false },
  { id:24, category:'Santé',            task:'Rendez-vous médecin',                                                           priority:true,  done:false },
  { id:25, category:'Santé',            task:'Rendez-vous opticien',                                                          priority:true,  done:false },
  { id:26, category:'Sovereign',        task:'Ajouter toutes les personnes de mon réseau LinkedIn dans mon bloc notes',       priority:false, done:false },
  { id:27, category:'Wish List',        task:'Faire des recherches sur le parfum Zara',                                       priority:false, done:false },
  { id:28, category:'Wish List',        task:'Faire des recherches sur un bon défroisseur',                                   priority:false, done:false },
];

let tasks = [], filter = 'all', isUrgent = false, nextId = 29;

// ── INIT ──
window.addEventListener('DOMContentLoaded', () => {
  if (!TG || !TG.CloudStorage) {
    // Hors Telegram : affiche quand même l'app avec les tâches par défaut
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    tasks = JSON.parse(JSON.stringify(DEFAULT_TASKS));
    render();
    return;
  }
  TG.ready();
  TG.expand();
  loadFromCloud();
});

// ── CLOUD STORAGE ──
function saveToCloud() {
  if (!TG?.CloudStorage) return;
  TG.CloudStorage.setItem('checklist_v2', JSON.stringify({ tasks, nextId }));
}

function loadFromCloud() {
  TG.CloudStorage.getItem('checklist_v2', (err, value) => {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    if (!err && value) {
      try {
        const p = JSON.parse(value);
        tasks = p.tasks || [];
        nextId = p.nextId || tasks.length + 1;
      } catch(e) {
        // 1er lancement : charge les tâches par défaut
        tasks = JSON.parse(JSON.stringify(DEFAULT_TASKS));
        nextId = 29;
        saveToCloud();
      }
    } else {
      // 1er lancement
      tasks = JSON.parse(JSON.stringify(DEFAULT_TASKS));
      nextId = 29;
      saveToCloud();
    }
    render();
  });
}

// ── ACTIONS ──
function addTask() {
  const cat = document.getElementById('inp-cat').value.trim();
  const txt = document.getElementById('inp-task').value.trim();
  if (!cat || !txt) return toast('Remplis catégorie et tâche');
  tasks.push({ id: nextId++, category: cat, task: txt, priority: isUrgent, done: false });
  document.getElementById('inp-cat').value = '';
  document.getElementById('inp-task').value = '';
  isUrgent = false;
  document.getElementById('btn-urg').classList.remove('on');
  saveToCloud(); render(); toast('Tâche ajoutée ✓');
}

function toggleTask(id) {
  const t = tasks.find(x => x.id === id);
  if (t) { t.done = !t.done; saveToCloud(); render(); }
}

function deleteTask(id) {
  tasks = tasks.filter(x => x.id !== id);
  saveToCloud(); render(); toast('Supprimée');
}

function resetDone() {
  if (!confirm('Supprimer toutes les tâches terminées ?')) return;
  tasks = tasks.filter(t => !t.done);
  saveToCloud(); render(); toast('Réinitialisé');
}

function toggleUrgent() {
  isUrgent = !isUrgent;
  document.getElementById('btn-urg').classList.toggle('on', isUrgent);
}

// ── RENDER ──
function setF(f, btn) {
  filter = f;
  document.querySelectorAll('.flt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  let list = tasks;
  if (filter === 'todo') list = tasks.filter(t => !t.done);
  else if (filter === 'urgent') list = tasks.filter(t => t.priority && !t.done);
  else if (filter === 'done') list = tasks.filter(t => t.done);

  const done = tasks.filter(t => t.done).length;
  document.getElementById('cnt-done').textContent = done;
  document.getElementById('cnt-total').textContent = tasks.length;

  const cats = [...new Set(tasks.map(t => t.category))];
  document.getElementById('cat-dl').innerHTML = cats.map(c => `<option value="${esc(c)}">`).join('');

  document.getElementById('done-section').textContent = done > 0
    ? `${done} tâche${done > 1 ? 's' : ''} terminée${done > 1 ? 's' : ''}`
    : "Aucune tâche terminée pour l'instant";

  const tbody = document.getElementById('tbody');
  if (list.length === 0) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="4">Aucune tâche dans cette vue</td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(t => `
    <tr class="${t.priority ? 'prio' : ''} ${t.done ? 'done' : ''}">
      <td><div class="cb" onclick="toggleTask(${t.id})">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
          <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div></td>
      <td class="cat-cell">${esc(t.category)}</td>
      <td>${esc(t.task)}</td>
      <td>
        <span class="badge ${t.done ? 'badge-done' : 'badge-todo'}">${t.done ? 'Fait ✓' : 'À faire'}</span>
        <button class="del-btn" onclick="deleteTask(${t.id})">🗑</button>
      </td>
    </tr>`).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}
document.getElementById('inp-task').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});
</script>
</body>
</html>
