<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --crimson:      #A51C30;
  --crimson-dk:   #8B0000;
  --crimson-lt:   #F5EAEC;
  --black:        #1A1A1A;
  --gray-dk:      #3D3D3D;
  --gray-md:      #767676;
  --gray-lt:      #E0DADA;
  --gray-bg:      #EEEBEB;
  --white:        #FFFFFF;
  --border:       #D4CCCA;
  --border-lt:    #EDE8E7;
  --sep-bg:       #F7F3F2;
  --stripe-a:     #FFFFFF;
  --stripe-b:     #FAFAFA;
  --red:#C0392B; --red-bg:#FBEEEC;
  --grn:#1A6B3A; --grn-bg:#E8F5EE;
  --blu:#1A4A7A; --blu-bg:#E8EFF8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{overflow-x:hidden;}
body{font-family:'Inter',sans-serif;background:var(--gray-bg);color:var(--black);min-height:100vh;padding:0 0 90px;}
.wrap{max-width:980px;margin:0 auto;}

/* TOP BLACK BAR */
.top-bar{background:var(--black);padding:0 16px;height:34px;display:flex;align-items:center;justify-content:flex-end;gap:8px;position:relative;width:100vw;left:50%;margin-left:-50vw;}
.tb-left{display:flex;align-items:center;gap:10px;}
.tb-logo{width:22px;height:22px;border-radius:4px;object-fit:cover;flex-shrink:0;}
.tb-title{font-size:12px;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.12em;text-transform:uppercase;}
.tb-right{display:flex;align-items:center;gap:6px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#6EE7A8;flex-shrink:0;}
.sync-dot.syncing{background:#F0C040;animation:blink .8s infinite;}
.sync-dot.error{background:#E74C3C;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tb-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:4px;color:rgba(255,255,255,.7);font-size:14px;cursor:pointer;width:28px;height:24px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.tb-btn:hover{background:rgba(255,255,255,.2);}

/* HEADER BANNER */
.header{background:var(--white);border-bottom:4px solid var(--crimson);padding:18px 24px 16px;display:flex;align-items:center;justify-content:space-between;gap:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.h-left{display:flex;align-items:center;gap:14px;min-width:0;flex:1;}
.h-logo{width:50px;height:50px;border-radius:14px;border:2px solid #000;object-fit:cover;flex-shrink:0;background:transparent;}
.h-titles{min-width:0;}
.h-title{font-family:'Libre Baskerville',serif;font-size:26px;font-weight:700;color:var(--black);letter-spacing:-.01em;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.h-sub{font-size:12px;font-weight:600;color:var(--crimson);letter-spacing:.1em;text-transform:uppercase;margin-top:3px;}
.h-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.prog-label{font-size:14px;font-weight:600;color:var(--gray-dk);white-space:nowrap;}
.prog-label em{font-style:normal;color:var(--crimson);font-weight:800;}
.gauge{display:flex;gap:3px;width:120px;}
.gauge-seg{flex:1;height:5px;border-radius:2px;background:var(--gray-lt);transition:background .25s;}
.gauge-seg.on{background:var(--crimson);}

/* TABS */
.tabs-wrap{background:var(--white);border-bottom:1px solid var(--border);position:relative;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.tabs-wrap::after{content:"›";position:absolute;right:0;top:0;bottom:0;width:30px;background:linear-gradient(to right,transparent,white 55%);display:flex;align-items:center;justify-content:flex-end;padding-right:7px;color:var(--gray-md);font-size:18px;pointer-events:none;}
.tabs{display:flex;padding:0 12px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;touch-action:pan-x;}
.tabs::-webkit-scrollbar{display:none;}
.tab{font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-md);padding:10px 13px;cursor:pointer;border-bottom:3px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;user-select:none;display:flex;align-items:center;gap:5px;flex-shrink:0;touch-action:manipulation;-webkit-user-drag:none;}
.tab:hover{color:var(--gray-dk);}
.tab.drag-over{box-shadow:inset 0 0 0 1px var(--crimson);}
.tab.active{color:var(--crimson);border-bottom-color:var(--crimson);}
.tab-badge{font-size:10px;font-weight:700;background:var(--gray-lt);color:var(--gray-md);border-radius:9px;padding:1px 6px;line-height:1.7;}
.tab.active .tab-badge{background:var(--crimson);color:white;}

/* BODY */
.body-card{background:var(--white);box-shadow:0 1px 4px rgba(0,0,0,.05),0 4px 16px rgba(0,0,0,.04);}

/* TABLE HEAD */
.thead{display:grid;grid-template-columns:40px 140px 1fr 116px;background:var(--sep-bg);padding:7px 16px;gap:8px;border-bottom:1px solid var(--border);}
.th{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gray-md);}
.th-uml{display:grid;grid-template-columns:28px 28px 28px 28px 18px;gap:3px;align-items:center;}
.th-uml span{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gray-md);text-align:center;}

/* SEPARATORS */
.prio-sep{display:flex;align-items:center;gap:8px;background:var(--sep-bg);padding:4px 16px 4px 64px;border-top:1.5px solid var(--border);border-bottom:1px solid var(--border-lt);}
.ps-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}
.ps-label{font-size:10.5px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;}
.prio-sep.sep-U .ps-dot{background:var(--red);} .prio-sep.sep-U .ps-label{color:var(--red);}
.prio-sep.sep-M .ps-dot{background:var(--grn);} .prio-sep.sep-M .ps-label{color:var(--grn);}
.prio-sep.sep-L .ps-dot{background:var(--blu);} .prio-sep.sep-L .ps-label{color:var(--blu);}
.cat-sep{background:var(--sep-bg);padding:5px 16px 5px 64px;border-top:2px solid var(--border);border-bottom:1px solid var(--border-lt);font-family:'Inter',sans-serif;font-size:10.5px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--crimson);}
.cat-grp:first-child .cat-sep{border-top:1px solid var(--border-lt);}

/* ROWS */
.row{display:grid;grid-template-columns:34px 120px 1fr 116px;align-items:center;padding:0 16px;gap:6px;min-height:52px;border-bottom:1px solid var(--border-lt);transition:background .1s;}
.row.sa{background:var(--stripe-a);} .row.sb{background:var(--stripe-b);}
.row:hover{background:var(--crimson-lt)!important;}
.row.done .rt{text-decoration:line-through;color:var(--gray-md);}
.row.done .rc{color:var(--gray-md);}
.chk-wrap{display:flex;align-items:center;justify-content:center;}
.chk{appearance:none;-webkit-appearance:none;width:16px;height:16px;border:1.5px solid var(--border);border-radius:3px;cursor:pointer;position:relative;transition:all .15s;flex-shrink:0;}
.chk:hover{border-color:var(--crimson);}
.chk:checked{background:var(--crimson);border-color:var(--crimson);}
.chk:checked::after{content:'';position:absolute;left:3px;top:1px;width:8px;height:5px;border-left:2px solid white;border-bottom:2px solid white;transform:rotate(-45deg);}
.rc{font-size:13.5px;font-weight:600;color:var(--gray-dk);}
.rt-wrap{display:flex;align-items:center;gap:5px;padding:9px 0;}
.rt{font-size:15px;font-weight:400;color:var(--black);line-height:1.4;flex:1;}
.rt-input{font-family:'Inter',sans-serif;font-size:13.5px;color:var(--black);border:1.5px solid var(--crimson);border-radius:3px;padding:4px 8px;flex:1;outline:none;background:white;}
.edit-btn{background:none;border:none;cursor:pointer;font-size:11px;color:var(--border);padding:2px 3px;border-radius:3px;opacity:0;transition:opacity .12s,color .12s;}
.row:hover .edit-btn{opacity:1;} .edit-btn:hover{color:var(--crimson);}
.save-btn{background:var(--crimson);color:white;border:none;cursor:pointer;font-size:11px;font-weight:700;padding:3px 9px;border-radius:3px;}
.act{display:grid;grid-template-columns:28px 28px 28px 28px 28px;align-items:center;gap:3px;justify-items:center;}
.pb{font-size:10.5px;font-weight:800;width:28px;height:26px;border-radius:5px;border:1.5px solid;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;background:transparent;flex-shrink:0;}
.pb.U{border-color:#EAB5AF;color:#C0392B;} .pb.U.on{background:var(--red);border-color:var(--red);color:white;} .pb.U:not(.on):hover{background:var(--red-bg);}
.pb.M{border-color:#8EC4A4;color:#1A6B3A;} .pb.M.on{background:var(--grn);border-color:var(--grn);color:white;} .pb.M:not(.on):hover{background:var(--grn-bg);}
.pb.A{border-color:#000;color:#000;} .pb.A.on{background:#000;border-color:#000;color:white;} .pb.A:not(.on):hover{background:var(--gray-bg);}
.apb.A{border-color:#000;color:#000;} .apb.A.sel{background:#000;border-color:#000;color:white;}
.empty{padding:40px 20px;text-align:center;}
.empty-icon{font-size:28px;margin-bottom:8px;opacity:.15;}
.empty-txt{font-size:13px;color:var(--gray-md);font-family:'Libre Baskerville',serif;font-style:italic;}

/* MODAL */
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:100;align-items:flex-end;justify-content:center;}
.backdrop.open{display:flex;}
.modal{background:var(--white);border-radius:14px 14px 0 0;padding:20px 18px 24px;width:100%;max-width:980px;display:flex;flex-direction:column;gap:12px;border-top:4px solid var(--crimson);box-shadow:0 -8px 32px rgba(0,0,0,.12);}
.modal-title{font-family:'Inter',system-ui,sans-serif;font-size:16px;font-weight:800;color:var(--crimson);letter-spacing:.06em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:none;border:none;font-size:18px;color:var(--gray-md);cursor:pointer;line-height:1;padding:0 4px;}
.modal-row{display:flex;gap:8px;flex-wrap:wrap;}
.modal input[type="text"]{font-family:'Inter',sans-serif;font-size:16px;border:1.5px solid var(--border);border-radius:4px;padding:9px 12px;background:white;outline:none;color:var(--black);transition:border-color .15s;height:42px;}
.modal input[type="text"]:focus{border-color:var(--crimson);}
.modal input[type="text"]::placeholder{color:var(--gray-lt);}
#new-cat{width:148px;} #new-task{flex:1;min-width:160px;}
.prio-grp{display:flex;gap:6px;}
.apb{font-size:11px;font-weight:800;width:42px;height:42px;border-radius:5px;border:1.5px solid;cursor:pointer;transition:all .12s;background:transparent;display:flex;align-items:center;justify-content:center;}
.apb.U{border-color:#EAB5AF;color:#C0392B;} .apb.U.sel{background:var(--red);border-color:var(--red);color:white;}
.apb.M{border-color:#8EC4A4;color:#1A6B3A;} .apb.M.sel{background:var(--grn);border-color:var(--grn);color:white;}
.apb.L{border-color:#9FBAD4;color:#1A4A7A;} .apb.L.sel{background:var(--blu);border-color:var(--blu);color:white;}
.add-btn{font-family:'Inter',sans-serif;font-size:11.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;background:var(--crimson);color:white;border:none;border-radius:4px;padding:0 22px;height:42px;cursor:pointer;transition:background .15s;white-space:nowrap;flex-shrink:0;}
.add-btn:hover{background:var(--crimson-dk);}

/* FAB */
.fab{position:fixed;bottom:28px;right:22px;width:54px;height:54px;border-radius:50%;background:var(--crimson);color:white;border:none;font-size:28px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:90;line-height:1;transition:background .15s;}
.fab:hover{background:var(--crimson);transform:none;}
.fab:active{transform:none;}

/* MOBILE */
@media(max-width:640px){
  body{padding:0 0 90px;}
  .top-bar{padding:0 14px;}
  .tb-title{display:none;}
  .header{padding:12px 16px 10px;}
  .h-logo{width:38px;height:38px;}
  .h-title{font-size:17px;}
  .h-sub{display:none;}
  .prog-label{font-size:12px;}
  .gauge{width:70px;}
  .thead{grid-template-columns:36px 1fr 100px;padding:5px 12px;}
  .thead .th:nth-child(2){display:none;}
  .row{grid-template-columns:36px 1fr 100px;min-height:48px;padding:0 12px;}
  .row .rc{display:none;}
  .rt{font-size:13px;}
  .act{grid-template-columns:26px 26px 26px 26px 16px;gap:2px;}
  .pb{width:26px;height:24px;font-size:10px;}
  .th-uml{grid-template-columns:26px 26px 26px 26px 16px;gap:2px;}
  .cat-sep{padding:4px 12px 4px 56px;}
  .prio-sep{padding:3px 12px 3px 56px;}
  .tab{padding:9px 10px;font-size:9.5px;}
  .modal{padding:18px 14px 28px;}
  #new-cat{width:130px;}
  .fab{bottom:22px;right:16px;}
}
@supports(padding-bottom:env(safe-area-inset-bottom)){
  .fab{bottom:calc(22px + env(safe-area-inset-bottom));}
  .modal{padding-bottom:calc(20px + env(safe-area-inset-bottom));}
}

.bottom-bar {
  background: var(--black);
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 20px;
  margin-top: 0;
}
.bottom-label {
  font-size: 10px;
  font-weight: 500;
  color: rgba(255,255,255,.4);
  letter-spacing: .12em;
  text-transform: uppercase;
}
</style>
</head>

function clearAutoDelete(id){
  if(deleteTimers[id]){ clearTimeout(deleteTimers[id]); delete deleteTimers[id]; }
}
function scheduleAutoDelete(task){
  clearAutoDelete(task.id);
  if(!task.done) return;
  if(!task.doneAt) task.doneAt = Date.now();
  var delay = 24*60*60*1000 - (Date.now() - Number(task.doneAt || 0));
  if(delay <= 0){ autoDeleteTask(task.id); return; }
  deleteTimers[task.id] = setTimeout(function(){ autoDeleteTask(task.id); }, delay);
}
function autoDeleteTask(id){
  var t = tasks.find(function(t){return t.id===id;});
  if(!t||!t.done) return;
  var elapsed = Date.now() - Number(t.doneAt || 0);
  if(elapsed < 24*60*60*1000){ scheduleAutoDelete(t); return; }
  tasks = tasks.filter(function(t){return t.id!==id;});
  clearAutoDelete(id);
  render();
  saveTasks();
  if(supabaseClient) deleteRemoteTask(id);
}
function scheduleAllAutoDelete(){
  tasks.forEach(function(t){ if(t.done) scheduleAutoDelete(t); });

}
function setSyncState(state){
  var d=document.getElementById('sync-dot');
  if(!d)return;
  d.classList.remove('syncing','error');
  if(state) d.classList.add(state);
}
function initSupabase(){
  if(!window.supabase) return;
  supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  setSyncState('syncing');
  loadTasksRemote().then(function(){ setSyncState(); }).catch(function(e){ console.warn('Supabase load failed',e); setSyncState('error'); }).finally(function(){ subscribeToRemoteChanges(); });
}
async function loadTasksRemote(){
  if(!supabaseClient) return;
  setSyncState('syncing');
  var localById = {};
  tasks.forEach(function(t){ localById[t.id] = t; });
  var res=await supabaseClient.from(SUPABASE_TABLE).select().order('id',{ascending:true});
  if(res.error) throw res.error;
  if(Array.isArray(res.data)){
    var rows = res.data.map(function(t){
      var doneAt = typeof t.doneAt==='number'?t.doneAt:(typeof t.doneAt==='string'?parseInt(t.doneAt,10):undefined);
      return {id:t.id,cat:t.cat,text:t.text,prio:t.prio,done:t.done,today:t.today||false,doneAt:doneAt};
    });
    var settingsTask = rows.find(function(t){return t.cat === SETTINGS_CAT;});
    if(settingsTask){
      settingsId = settingsTask.id;
      try{
        var s = JSON.parse(settingsTask.text);
        if(Array.isArray(s.tabs)) TABS = s.tabs;
        if(typeof s.tab === 'string') tab = s.tab;
        CO = TABS.filter(function(x){return !['All','Urgent','Completed',TODAY_TAB].includes(x);});
      }catch(e){}
    }
    var merged = rows.map(function(rt){
      var local = localById[rt.id];
      if(local){
        if(local.today && !rt.today) rt.today = local.today;
        if(local.doneAt && !rt.doneAt) rt.doneAt = local.doneAt;
        delete localById[rt.id];
      }
      return rt;
    });
    Object.keys(localById).forEach(function(id){ merged.push(localById[id]); });
    tasks = merged.filter(function(t){return t.cat !== SETTINGS_CAT;});
    // Ensure all task categories are in TABS
    var cats = [];
    tasks.forEach(function(t){ if(cats.indexOf(t.cat)<0) cats.push(t.cat); });
    cats.forEach(function(c){ if(TABS.indexOf(c)<0 && c !== 'Completed') TABS.push(c); });
    CO = TABS.filter(function(x){return !['All','Urgent','Completed',TODAY_TAB].includes(x);});
    saveTasks();
    render();
    scheduleAllAutoDelete();
  }
  setSyncState();
}
async function insertRemoteTask(task){
  if(!supabaseClient) return;
  setSyncState('syncing');
  var payload={cat:task.cat,text:task.text,prio:task.prio,done:task.done};
  if(task.today!==undefined) payload.today=task.today;
  if(task.doneAt!==undefined) payload.doneAt=task.doneAt;
  var res=await supabaseClient.from(SUPABASE_TABLE).insert([payload]).select();
  if(res.error){
    var msg=String(res.error.message||res.error);
    if(/today/.test(msg)) delete payload.today;
    if(/doneAt/.test(msg)) delete payload.doneAt;
    if(/today/.test(msg)||/doneAt/.test(msg)) res=await supabaseClient.from(SUPABASE_TABLE).insert([payload]).select();
  }
  if(res.error){ console.warn('Supabase insert failed',res.error); setSyncState('error'); }
  else {
    if(Array.isArray(res.data)&&res.data[0]&&res.data[0].id!==undefined&&res.data[0].id!==task.id){
      var oldId=task.id;
      var newId=res.data[0].id;
      var t=tasks.find(function(x){return x.id===oldId;});
      if(t){ t.id=newId; saveTasks(); }
    }
    // if the task changed while the insert was pending, reapply latest state and force a remote refresh
    var current = tasks.find(function(x){return x.id===task.id;});
    if(current){
      var updatePayload={};
      if(current.today!==payload.today) updatePayload.today=current.today;
      if(current.doneAt!==payload.doneAt) updatePayload.doneAt=current.doneAt;
      if(current.done!==payload.done) updatePayload.done=current.done;
      if(current.prio!==payload.prio) updatePayload.prio=current.prio;
      if(current.text!==payload.text) updatePayload.text=current.text;
      if(Object.keys(updatePayload).length){ await updateRemoteTask(current.id, updatePayload); }
    }
    if(!res.error){ await loadTasksRemote(); }
    setSyncState();
  }
}
async function updateRemoteTask(id,changes){
  if(!supabaseClient) return;
  setSyncState('syncing');
  var res=await supabaseClient.from(SUPABASE_TABLE).update(changes).eq('id',id);
  if(res.error){
    var msg=String(res.error.message||res.error);
    var next = Object.assign({},changes);
    if(/today/.test(msg)) delete next.today;
    if(/doneAt/.test(msg)) delete next.doneAt;
    if(JSON.stringify(next)!==JSON.stringify(changes)) res=await supabaseClient.from(SUPABASE_TABLE).update(next).eq('id',id);
  }
  if(res.error){ console.warn('Supabase update failed',res.error); await loadTasksRemote(); setSyncState('error'); } else { await loadTasksRemote(); setSyncState(); }
}
async function deleteRemoteTask(id){
  if(!supabaseClient) return;
  setSyncState('syncing');
  var res=await supabaseClient.from(SUPABASE_TABLE).delete().eq('id',id);
  if(res.error){ console.warn('Supabase delete failed',res.error); setSyncState('error'); } else { setSyncState(); }
}
function subscribeToRemoteChanges(){
  if(!supabaseClient) return;
  var channel=supabaseClient.channel('realtime-tasks');
  channel.on('postgres_changes',{event:'INSERT',schema:'public',table:SUPABASE_TABLE},function(){ loadTasksRemote(); });
  channel.on('postgres_changes',{event:'UPDATE',schema:'public',table:SUPABASE_TABLE},function(){ loadTasksRemote(); });
  channel.on('postgres_changes',{event:'DELETE',schema:'public',table:SUPABASE_TABLE},function(){ loadTasksRemote(); });
  channel.subscribe();
}
window.addEventListener('storage', function(ev){
  if(ev.key!==STORAGE_KEY||!ev.newValue)return;
  try{
    var data=JSON.parse(ev.newValue);
    if(Array.isArray(data.tasks)){
      tasks=data.tasks.filter(function(t){return t.cat!==SETTINGS_CAT;});
      nid=typeof data.nid==='number'&&data.nid>0?data.nid:1;
      if(typeof data.tab==='string')tab=data.tab;
      if(Array.isArray(data.tabs))TABS=data.tabs;
      CO = TABS.filter(x => !['All','Urgent','Completed',TODAY_TAB].includes(x));
      render();
      scheduleAllAutoDelete();
    }
  }catch(e){}
});

function sc(a,b){var ai=CO.indexOf(a.cat),bi=CO.indexOf(b.cat);if(ai<0&&bi<0)return a.cat.localeCompare(b.cat);if(ai<0)return 1;if(bi<0)return-1;return ai-bi;}
function normalizeTab(x){return String(x||'').replace(/[\u2018\u2019\u201B\u2032]/g, "'");}
function isTodayTab(x){return normalizeTab(x)===TODAY_TAB;}

function otabs(){var c=[],r=TABS.slice();tasks.forEach(function(t){if(c.indexOf(t.cat)<0)c.push(t.cat);});c.forEach(function(x){if(r.indexOf(x)<0&&x!=='Completed')r.push(x);});r.push('Completed');return r;}
function vtabs(){return otabs().filter(function(x){if(x==='All')return true;if(isTodayTab(x))return true;if(x==='Urgent')return tasks.some(function(t){return t.prio==='U'&&!t.done;});if(x==='Completed')return tasks.some(function(t){return t.done;});return tasks.some(function(t){return t.cat===x&&!t.done;});});}
function tc(x){if(x==='All')return tasks.filter(function(t){return!t.done;}).length;if(isTodayTab(x))return tasks.filter(function(t){return t.today&&!t.done;}).length;if(x==='Urgent')return tasks.filter(function(t){return t.prio==='U'&&!t.done;}).length;if(x==='Completed')return tasks.filter(function(t){return t.done;}).length;return tasks.filter(function(t){return t.cat===x&&!t.done;}).length;}

function render(){rTabs();rTasks();rGauge();rDl();}

function rTabs(){var ts=vtabs();if(ts.indexOf(tab)<0)tab='All';var h='';ts.forEach(function(x){var safeTab=String(x).replace(/'/g,"\\'");h+='<div class="tab'+(tab===x?' active':'')+'" data-tab="'+x+'" onclick="setTab(\''+safeTab+'\')" draggable="true" ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="drop(event)" onpointerdown="tabPointerDown(event)" onpointermove="tabPointerMove(event)" onpointerup="tabPointerUp(event)" onpointercancel="tabPointerUp(event)">'+x+'<span class="tab-badge">'+tc(x)+'</span></div>';});document.getElementById('tabs').innerHTML=h;}

var draggedTab = null;
var dropTarget = null;
var pointerDrag = {active:false,startX:0,startY:0,moved:false,pointerId:null,draggedTab:null};
var ignoreClick = false;
function tabPointerDown(e){ var t=e.target.closest('.tab'); if(!t) return; pointerDrag.active=true; pointerDrag.startX=e.clientX; pointerDrag.startY=e.clientY; pointerDrag.moved=false; pointerDrag.pointerId=e.pointerId||null; pointerDrag.draggedTab=t; if(t.setPointerCapture) t.setPointerCapture(e.pointerId); }
function tabPointerMove(e){ if(!pointerDrag.active||!pointerDrag.draggedTab) return; var dx=Math.abs(e.clientX-pointerDrag.startX); var dy=Math.abs(e.clientY-pointerDrag.startY); if(dx<12&&dy<12) return; pointerDrag.moved=true; var target=document.elementFromPoint(e.clientX,e.clientY); var t=target&&target.closest('.tab'); if(t&&t!==pointerDrag.draggedTab){ if(dropTarget&&dropTarget!==t) dropTarget.classList.remove('drag-over'); dropTarget=t; dropTarget.classList.add('drag-over'); }}
function tabPointerUp(e){ if(!pointerDrag.active) return; if(pointerDrag.draggedTab&&pointerDrag.draggedTab.releasePointerCapture&&pointerDrag.pointerId!==null){ pointerDrag.draggedTab.releasePointerCapture(pointerDrag.pointerId); }
 if(pointerDrag.moved&&pointerDrag.draggedTab&&dropTarget&&dropTarget!==pointerDrag.draggedTab){ reorderTabs(pointerDrag.draggedTab.getAttribute('data-tab'),dropTarget.getAttribute('data-tab')); ignoreClick=true; } pointerDrag.active=false; pointerDrag.draggedTab=null; pointerDrag.pointerId=null; if(dropTarget){ dropTarget.classList.remove('drag-over'); dropTarget=null; } setTimeout(function(){ignoreClick=false;},0); }
function reorderTabs(fromTab,toTab){ var fromIndex=TABS.indexOf(fromTab); var toIndex=TABS.indexOf(toTab); if(fromIndex===-1||toIndex===-1||fromIndex===toIndex) return; var item=TABS.splice(fromIndex,1)[0]; TABS.splice(toIndex,0,item); CO=TABS.filter(function(x){return!['All','Urgent','Completed',TODAY_TAB].includes(x);}); render(); saveTasks(); saveSettingsRemote(); }
function dragStart(e) { draggedTab = e.target.closest('.tab'); if(draggedTab){ e.dataTransfer && (e.dataTransfer.effectAllowed = 'move'); }}
function dragOver(e) { e.preventDefault(); e.dataTransfer && (e.dataTransfer.dropEffect = 'move'); var t = e.target.closest('.tab'); if(t && t !== draggedTab){ dropTarget = t; }}
function dragEnter(e){ var t = e.target.closest('.tab'); if(t && t !== draggedTab){ dropTarget = t; t.classList.add('drag-over'); }}
function dragLeave(e){ var t = e.target.closest('.tab'); if(t && t !== draggedTab){ t.classList.remove('drag-over'); if(dropTarget===t) dropTarget=null; }}
async function saveSettingsRemote(){
  if(!supabaseClient) return;
  var settingsData = JSON.stringify({tabs: TABS, tab: tab});
  var payload={cat:SETTINGS_CAT,text:settingsData,prio:'L',done:true};
  if(settingsId){
    await updateRemoteTask(settingsId,{text:settingsData});
  } else {
    var res=await supabaseClient.from(SUPABASE_TABLE).insert([payload]).select();
    if(!res.error && Array.isArray(res.data)&&res.data[0]&&res.data[0].id!==undefined){ settingsId=res.data[0].id; }
  }
}
function drop(e) { e.preventDefault(); var target = e.target.closest('.tab')||dropTarget; if(target && draggedTab && target !== draggedTab){ var fromTab = draggedTab.getAttribute('data-tab'); var toTab = target.getAttribute('data-tab'); var fromIndex = TABS.indexOf(fromTab); var toIndex = TABS.indexOf(toTab); if(fromIndex !== -1 && toIndex !== -1){ var item = TABS.splice(fromIndex, 1)[0]; TABS.splice(toIndex, 0, item); CO = TABS.filter(x => !['All','Urgent','Completed',TODAY_TAB].includes(x)); render(); saveTasks(); saveSettingsRemote(); } } document.querySelectorAll('.tab.drag-over').forEach(function(el){el.classList.remove('drag-over');}); draggedTab=null; dropTarget=null; }

function gf(){if(tab==='All')return tasks.filter(function(t){return!t.done;});if(isTodayTab(tab))return tasks.filter(function(t){return t.today&&!t.done;});if(tab==='Urgent')return tasks.filter(function(t){return t.prio==='U'&&!t.done;});if(tab==='Completed')return tasks.filter(function(t){return t.done;});return tasks.filter(function(t){return t.cat===tab&&!t.done;});}

function rTasks(){
  var el=document.getElementById('list'),rows=gf();
  if(!rows.length){el.innerHTML='<div class="empty"><div class="empty-icon">&#10003;</div><div class="empty-txt">Aucune tache a afficher.</div></div>';return;}
  var isG=(tab==='All'||tab==='Completed'),h='',i=0;
  if(isG){
    var cats=[];rows.forEach(function(t){if(cats.indexOf(t.cat)<0)cats.push(t.cat);});cats.sort(function(a,b){return sc({cat:a},{cat:b});});
    cats.forEach(function(cat){var cr=rows.filter(function(t){return t.cat===cat;});cr.sort(function(a,b){return PO[a.prio]-PO[b.prio];});h+='<div class="cat-grp"><div class="cat-sep">'+cat+'</div>';cr.forEach(function(t){h+=rh(t,true,i++%2===0?'sa':'sb');});h+='</div>';});
  } else {
    ['U','M','L'].forEach(function(p){var pr=rows.filter(function(t){return t.prio===p;});pr.sort(sc);if(pr.length){h+='<div class="prio-sep sep-'+p+'"><div class="ps-dot"></div><span class="ps-label">'+PL[p]+'</span></div>';pr.forEach(function(t){h+=rh(t,false,i++%2===0?'sa':'sb');});}});
  }
  el.innerHTML=h;
}

function rh(t,hc,s){
  return '<div class="row '+(t.done?'done':'')+' '+s+'" id="r'+t.id+'">'
    +'<div class="chk-wrap"><input type="checkbox" class="chk"'+(t.done?' checked':'')+' onchange="tgl(\''+t.id+'\',this.checked)"></div>'
    +'<div class="rc">'+(hc?'':e(t.cat))+'</div>'
    +'<div class="rt-wrap"><span class="rt" id="s'+t.id+'">'+e(t.text)+'</span><button class="edit-btn" onclick="ed(\''+t.id+'\')">&#9999;</button></div>'
    +'<div class="act">'
    +'<button class="pb A'+(t.today?' on':'')+'" onclick="st(\''+t.id+'\')">A</button>'
    +'<button class="pb U'+(t.prio==='U'?' on':'')+'" onclick="sp(\''+t.id+'\',\'U\')">U</button>'
    +'<button class="pb M'+(t.prio==='M'?' on':'')+'" onclick="sp(\''+t.id+'\',\'M\')">M</button>'
    +'<button class="pb L'+(t.prio==='L'?' on':'')+'" onclick="sp(\''+t.id+'\',\'L\')">L</button>'
    +'</div></div>';
}

function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function rGauge(){var tot=tasks.length,dn=tasks.filter(function(t){return t.done;}).length;document.getElementById('dn').textContent=dn;document.getElementById('tot').textContent=tot;var f=tot?Math.round(dn/tot*20):0,h='';for(var i=0;i<20;i++)h+='<div class="gauge-seg'+(i<f?' on':'')+'"></div>';document.getElementById('gauge').innerHTML=h;}

function rDl(){var c=[];tasks.forEach(function(t){if(c.indexOf(t.cat)<0)c.push(t.cat);});document.getElementById('cl').innerHTML=c.map(function(x){return'<option value="'+e(x)+'">';}).join('');}

function setTab(x){if(ignoreClick){ignoreClick=false;return;}tab=x;render();pfc();saveTasks();saveSettingsRemote();}
async function tgl(id,v){var t=tasks.find(function(t){return t.id===id;});if(t){t.done=v;if(v){t.doneAt=Date.now();scheduleAutoDelete(t);}else{delete t.doneAt;clearAutoDelete(id);}}render();saveTasks(); if(supabaseClient) await updateRemoteTask(id,{done:v,doneAt:v?t.doneAt:null});}
async function sp(id,p){var t=tasks.find(function(t){return t.id===id;});if(t){t.prio=p;t.done=false;delete t.doneAt;clearAutoDelete(id);}render();saveTasks(); if(supabaseClient) await updateRemoteTask(id,{prio:p,done:false,doneAt:null});}
async function st(id){var t=tasks.find(function(t){return t.id===id;});if(t){t.today=!t.today;}render();saveTasks(); if(supabaseClient) await updateRemoteTask(id,{today:t.today});}
async function dt(id){tasks=tasks.filter(function(t){return t.id!==id;});render();saveTasks(); if(supabaseClient) await deleteRemoteTask(id);}

function ed(id){
  var t=tasks.find(function(t){return t.id===id;});if(!t)return;
  var sp=document.getElementById('s'+id);if(!sp)return;
  var w=sp.parentElement;
  w.innerHTML='<input class="rt-input" id="ei'+id+'" value="'+e(t.text)+'" onkeydown="if(event.key===\'Enter\')sv(\''+id+'\');if(event.key===\'Escape\')render();" autofocus><button class="save-btn" onclick="sv(\''+id+'\')">OK</button>';
  document.getElementById('ei'+id).focus();
}
async function sv(id){var i=document.getElementById('ei'+id);if(!i)return;var v=i.value.trim();if(!v)return;var t=tasks.find(function(t){return t.id===id;});if(t)t.text=v;render();saveTasks(); if(supabaseClient) await updateRemoteTask(id,{text:v});}

function openModal(){document.getElementById('bd').classList.add('open');setTimeout(function(){document.getElementById('new-task').focus();},80);}
function closeModal(){document.getElementById('bd').classList.remove('open');}
function bdClick(ev){if(ev.target===document.getElementById('bd'))closeModal();}

function selP(btn){document.querySelectorAll('.apb').forEach(function(b){b.classList.remove('sel');});btn.classList.add('sel');np=btn.getAttribute('data-p');}
function selA(btn){na=!na;btn.classList.toggle('sel');}

async function addTask(){
  var ce=document.getElementById('new-cat'),te=document.getElementById('new-task');
  var cat=ce.value.trim(),txt=te.value.trim();
  if(!cat){ce.style.borderColor='#C0392B';setTimeout(function(){ce.style.borderColor='';},1200);}
  if(!txt){te.style.borderColor='#C0392B';setTimeout(function(){te.style.borderColor='';},1200);}
  if(!cat||!txt)return;
  var task={id:newId(),cat:cat,text:txt,prio:np,done:false,today:na,doneAt:undefined};
  tasks.push(task);
  te.value='';na=false;pfc();closeModal();render();saveTasks(); if(supabaseClient) await insertRemoteTask(task);
}

function pfc(){var sp=['All','Urgent','Completed'];document.getElementById('new-cat').value=sp.indexOf(tab)<0?tab:'';}

document.addEventListener('keydown',function(e){if(e.ctrlKey&&e.key==='r'){e.preventDefault();location.reload();}if(e.key==='Escape')closeModal();});
document.getElementById('new-task').addEventListener('keydown',function(e){if(e.key==='Enter')addTask();});

loadTasks();
scheduleAllAutoDelete();
render();
initSupabase();
</script>
